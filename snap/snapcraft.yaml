name: kai
version: '1.7.9'
summary: AI assistant powered by Ollama, Gemini, ChatGPT and more
description: |
  Kai is a desktop AI assistant that connects to multiple AI providers
  including Ollama, Gemini, ChatGPT, and more. Chat with local and
  cloud-based language models from a single application.
grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64

apps:
  kai:
    command: bin/Kai
    environment:
      LD_LIBRARY_PATH: $SNAP/lib/runtime/lib:$LD_LIBRARY_PATH
    plugs:
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - home

parts:
  kai:
    plugin: dump
    source: https://github.com/SimonSchubert/Kai/releases/download/v1.7.9/Kai-1.7.9-linux-x86_64.tar.gz
    source-subdir: Kai

# Publishing steps:
# 1. Create Snap Store account at https://snapcraft.io
# 2. snapcraft register kai
# 3. snapcraft (build the snap)
# 4. snapcraft upload --release=stable kai_*.snap
