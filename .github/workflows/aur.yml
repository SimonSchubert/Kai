name: AUR Package

on:
  push:
    paths:
      - 'aur/**'
  pull_request:
    paths:
      - 'aur/**'
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]

jobs:
  validate:
    name: Validate PKGBUILD
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Install namcap
        run: pacman -Sy --noconfirm namcap

      - name: Lint PKGBUILD
        working-directory: aur
        run: namcap PKGBUILD

      - name: Validate .SRCINFO
        working-directory: aur
        run: |
          su builder -c "makepkg --printsrcinfo" > .SRCINFO.generated
          diff -u .SRCINFO .SRCINFO.generated

  publish:
    name: Publish to AUR
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install dependencies
        run: pacman -Sy --noconfirm openssh git

      - name: Get version from release
        id: version
        run: echo "version=$(echo '${{ github.event.workflow_run.head_branch }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version and checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/SimonSchubert/Kai/releases/download/v${VERSION}/Kai-${VERSION}-linux-x86_64.tar.gz"

          # Download tarball and compute SHA256
          curl -L -o tarball.tar.gz "$TARBALL_URL"
          SHA256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)
          rm tarball.tar.gz

          # Update PKGBUILD
          cd aur
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i "s|^pkgrel=.*|pkgrel=1|" PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA256}')|" PKGBUILD

          # Regenerate .SRCINFO
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo" > .SRCINFO

          echo "Updated to version ${VERSION} with sha256 ${SHA256}"
          cat PKGBUILD
          cat .SRCINFO

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" > ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          echo "aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN" >> ~/.ssh/known_hosts

          # Configure git
          git config --global user.name "Simon Schubert"
          git config --global user.email "sschubert89@gmail.com"

          # Clone AUR repo, update files, push
          cd /tmp
          git clone ssh://aur@aur.archlinux.org/kai-bin.git
          cp $GITHUB_WORKSPACE/aur/PKGBUILD kai-bin/
          cp $GITHUB_WORKSPACE/aur/.SRCINFO kai-bin/
          cd kai-bin
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.version }}"
          git push

      - name: Update repo PKGBUILD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd $GITHUB_WORKSPACE

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git checkout main
          git add aur/PKGBUILD aur/.SRCINFO
          git commit -m "Update AUR package to ${VERSION}" || exit 0
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/SimonSchubert/Kai.git main
