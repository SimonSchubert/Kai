name: Test Flatpak Build

on:
  workflow_dispatch:

jobs:
  flatpak:
    name: Test Flatpak Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download existing release tarball
        run: |
          curl -L -o Kai-linux-x86_64.tar.gz \
            https://github.com/SimonSchubert/Kai/releases/download/v2.1.1/Kai-2.1.1-linux-x86_64.tar.gz
      - name: Install Flatpak and Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak
        run: |
          # Copy tarball to flatpak dir and compute sha256
          cp Kai-linux-x86_64.tar.gz flatpak/
          SHA256=$(sha256sum Kai-linux-x86_64.tar.gz | cut -d' ' -f1)

          # Patch manifest to use local tarball instead of URL
          cd flatpak
          sed -i "s|url: https://github.com/SimonSchubert/Kai/releases/download/.*|path: Kai-linux-x86_64.tar.gz|" io.github.simonschubert.Kai.yaml
          sed -i "s|sha256: .*|sha256: ${SHA256}|" io.github.simonschubert.Kai.yaml

          echo "=== Modified manifest ==="
          cat io.github.simonschubert.Kai.yaml

          # Build and bundle
          flatpak-builder --repo=repo --force-clean build-dir io.github.simonschubert.Kai.yaml
          flatpak build-bundle repo ../Kai.flatpak io.github.simonschubert.Kai

          echo "=== Success ==="
          ls -lh ../Kai.flatpak
      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-flatpak
          path: Kai.flatpak
